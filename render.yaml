services:
  - type: web
    name: analysts-desk
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SAM_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
